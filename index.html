<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador IRF 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .contenedor-principal {
            display: flex;
            gap: 40px;
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            max-width: 900px;
            width: 100%;
        }

        .area-preview { flex: 1; display: flex; justify-content: center; }

        .lienzo-credencial {
            position: relative;
            width: 400px; 
            height: 400px;
            background-color: #000;
            overflow: hidden;
        }

        .fondo-canva {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Foto ajustada para encajar DENTRO del aro amarillo */
        .foto-perfil-render {
            position: absolute;
            top: 80px;    
            left: 119px;    
            width: 162px;  
            height: 162px; 
            background-color: #21262d;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            z-index: 2;
        }

        /* Textos bajados a la nueva posición */
        .textos-render {
            position: absolute;
            top: 260px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px; 
            z-index: 3;
            font-family: 'Georgia', serif; 
        }

        .textos-render h2 {
            margin: 0;
            font-size: 22px;
            font-weight: normal;
        }

        .textos-render p {
            margin: 0;
            font-size: 14px;
            color: white;
        }

        .texto-amarillo {
            color: #f7c02b;
        }

        .area-formulario {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-grupo { display: flex; flex-direction: column; gap: 8px; }

        input[type="text"], input[type="file"] {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-generar {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-generar:hover { background-color: #2ea043; }
        .btn-generar:disabled { background-color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        
        <div class="area-preview">
            <div class="lienzo-credencial" id="credencial-final">
                <img src="base.jpg" class="fondo-canva" alt="Fondo Base">
                
                <div class="foto-perfil-render" id="render-foto"></div>
                
                <div class="textos-render">
                    <h2 id="render-nombre" class="texto-amarillo">Nombre Apellido</h2>
                    <p>#El talento nace en <span id="render-ciudad-span" class="texto-amarillo">Ciudad</span></p>
                </div>
            </div>
        </div>

        <div class="area-formulario">
            <h2>Únete al viaje</h2>
            <p>Sube tu foto y representa a tu ciudad.</p>

            <div class="form-grupo">
                <label>Nombre y Apellido</label>
                <input type="text" id="input-nombre" placeholder="Ej. Nombre Apellido" oninput="actualizarTexto('input-nombre', 'render-nombre', 'Nombre Apellido')">
            </div>

            <div class="form-grupo">
                <label>Ciudad</label>
                <input type="text" id="input-ciudad" placeholder="Ej. Ciudad" oninput="actualizarTexto('input-ciudad', 'render-ciudad-span', 'Ciudad')">
            </div>

            <div class="form-grupo">
                <label>Foto de Perfil</label>
                <input type="file" id="input-foto" accept="image/*" onchange="cargarFoto(event)">
            </div>

            <button class="btn-generar" id="btn-descarga" onclick="descargarCredencial()">⬇ Descargar Imagen</button>
        </div>

    </div>

    <script>
        function actualizarTexto(idInput, idRender, textoPorDefecto) {
            const texto = document.getElementById(idInput).value;
            document.getElementById(idRender).innerText = texto || textoPorDefecto; 
        }

        function cargarFoto(event) {
            const archivo = event.target.files[0];
            if (archivo) {
                const lector = new FileReader();
                lector.onload = function(e) {
                    document.getElementById('render-foto').style.backgroundImage = `url(${e.target.result})`;
                }
                lector.readAsDataURL(archivo);
            }
        }

        function descargarCredencial() {
            const boton = document.getElementById('btn-descarga');
            const nodoCredencial = document.getElementById('credencial-final');
            
            boton.innerText = "Generando...";
            boton.disabled = true;

            html2canvas(nodoCredencial, { 
                scale: 2, 
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    const enlace = document.createElement('a');
                    enlace.download = 'IRF2026-Talento.png';
                    enlace.href = dataUrl;
                    enlace.click();
                    
                    boton.innerText = "⬇ Descargar Imagen";
                    boton.disabled = false;
                } catch (error) {
                    alert("⚠️ Aviso de Seguridad Local:\nEl código funciona perfectamente, pero tu navegador bloquea la descarga porque abriste el archivo con doble clic.\n\nSolución: Sube los archivos a GitHub/Vercel o usa un Live Server para probarlo.");
                    boton.innerText = "⬇ Descargar Imagen";
                    boton.disabled = false;
                }
            }).catch(err => {
                alert("Ocurrió un error al procesar la imagen.");
                boton.innerText = "⬇ Descargar Imagen";
                boton.disabled = false;
            });
        }
    </script>
</body>
</html>
